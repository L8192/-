<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUP咖啡 · AI知识库问答</title>
<style>
  :root {
    --brown: #6B3A2A; --brown-light: #8B5E3C; --cream: #FFF8F0;
    --cream-dark: #F5E6D3; --gold: #C8963E; --text: #2C1810;
    --text-light: #5C4030; --white: #FFF;
    --shadow: 0 2px 12px rgba(107,58,42,.10);
    --radius: 16px; --radius-sm: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--cream); color: var(--text);
    height: 100vh; display: flex; justify-content: center; align-items: center;
  }
  .app {
    width:100%; max-width:820px; height:100vh; max-height:900px;
    display:flex; flex-direction:column; background:var(--white);
    box-shadow:var(--shadow); border-radius:var(--radius); overflow:hidden;
    position:relative;
  }
  @media (max-width:768px) { .app { max-width:100%; height:100vh; max-height:none; border-radius:0; } }

  /* 标题栏 */
  .header {
    background:linear-gradient(135deg,var(--brown),var(--brown-light));
    color:var(--white); padding:12px 20px;
    display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
  }
  .header .brand { display:flex; align-items:center; gap:10px; }
  .header .logo { font-size:24px; }
  .header h1 { font-size:16px; font-weight:600; }
  .header .sub { font-size:11px; opacity:.8; }
  .header .user-area { display:flex; align-items:center; gap:8px; }
  .header .btn {
    padding:5px 14px; border:1px solid rgba(255,255,255,.4); border-radius:14px;
    background:transparent; color:#fff; font-size:12px; cursor:pointer;
    transition: background .2s;
  }
  .header .btn:hover { background:rgba(255,255,255,.15); }
  .header .user-tag { font-size:13px; }
  .header .btn-outline { border-color:rgba(255,255,255,.6); }

  /* 聊天区 */
  .chat-area {
    flex:1; overflow-y:auto; padding:20px 24px;
    display:flex; flex-direction:column; gap:16px; background:#FAFAFA;
  }
  .chat-area::-webkit-scrollbar { width:5px; }
  .chat-area::-webkit-scrollbar-thumb { background:#DDD; border-radius:3px; }

  /* 消息气泡 */
  .msg { display:flex; gap:10px; max-width:85%; animation:fadeIn .3s ease; }
  .msg.user { align-self:flex-end; flex-direction:row-reverse; }
  .msg.assistant { align-self:flex-start; }
  .bubble {
    padding:12px 16px; border-radius:var(--radius-sm);
    font-size:14px; line-height:1.7; word-break:break-word;
  }
  .msg.user .bubble { background:var(--brown); color:var(--white); border-bottom-right-radius:4px; }
  .msg.assistant .bubble { background:var(--white); color:var(--text); border:1px solid #E8DDD2; border-bottom-left-radius:4px; }
  .msg.assistant .bubble p { margin:0 0 6px; }
  .msg.assistant .bubble p:last-child { margin-bottom:0; }
  .msg.assistant .bubble strong { color:var(--brown); }
  .msg.assistant .bubble ul,.msg.assistant .bubble ol { margin:4px 0; padding-left:18px; }
  .msg.assistant .bubble li { margin-bottom:2px; }
  .msg.assistant .bubble code { background:#F5E6D3; padding:1px 5px; border-radius:3px; font-family:Consolas,monospace; font-size:13px; }
  .msg.assistant .bubble table { border-collapse:collapse; margin:6px 0; font-size:12px; }
  .msg.assistant .bubble th,.msg.assistant .bubble td { border:1px solid #E0D5C5; padding:4px 8px; text-align:left; }
  .msg.assistant .bubble th { background:#F5E6D3; font-weight:600; }
  .msg.assistant .bubble h3 { font-size:14px; color:var(--brown); margin:8px 0 4px; }
  .msg.assistant .bubble blockquote { border-left:3px solid var(--gold); margin:6px 0; padding:2px 10px; color:var(--text-light); font-style:italic; }
  .avatar {
    width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;
  }
  .msg.user .avatar { background:var(--brown-light); }
  .msg.assistant .avatar { background:var(--cream-dark); }

  .sources { margin-top:8px; display:flex; flex-wrap:wrap; gap:6px; }
  .source-tag { font-size:11px; padding:3px 8px; background:var(--cream-dark); color:var(--text-light); border-radius:12px; cursor:default; max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .source-tag:hover { background:var(--gold); color:var(--white); }
  .token-info { margin-top:6px; font-size:10px; color:#BBA89A; }

  .typing { display:flex; gap:4px; padding:6px 0; }
  .typing span { width:7px; height:7px; background:var(--brown-light); border-radius:50%; animation:bounce 1.4s infinite ease-in-out both; }
  .typing span:nth-child(1) { animation-delay:-.32s; }
  .typing span:nth-child(2) { animation-delay:-.16s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0);} 40%{transform:scale(1);} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

  /* 欢迎区 */
  .welcome { text-align:center; padding:32px 20px; color:var(--text-light); }
  .welcome .icon { font-size:44px; margin-bottom:10px; }
  .welcome h2 { font-size:17px; margin-bottom:6px; color:var(--brown); }
  .welcome p { font-size:13px; line-height:1.8; }

  /* 快捷提问 */
  .quick-bar {
    display:flex; flex-wrap:wrap; gap:8px; padding:10px 20px;
    background:var(--white); border-top:1px solid #F0E8DC; justify-content:center; flex-shrink:0;
  }
  .quick-bar .hint {
    font-size:12px; padding:5px 12px; background:var(--cream-dark); border-radius:14px;
    cursor:pointer; color:var(--text-light); border:none; white-space:nowrap;
    transition: background .2s, color .2s;
  }
  .quick-bar .hint:hover { background:var(--brown); color:var(--white); }

  /* 输入区 */
  .input-area {
    padding:10px 20px; border-top:1px solid #F0E8DC;
    display:flex; gap:10px; align-items:flex-end; background:var(--white); flex-shrink:0;
  }
  .input-area textarea {
    flex:1; border:1.5px solid #E0D5C5; border-radius:var(--radius-sm);
    padding:10px 14px; font-size:14px; font-family:inherit; resize:none;
    outline:none; max-height:100px; line-height:1.5; background:#FAFAFA;
    transition: border-color .2s;
  }
  .input-area textarea:focus { border-color:var(--brown); background:var(--white); }
  .input-area button {
    width:44px; height:44px; border:none; border-radius:50%;
    background:var(--brown); color:var(--white); font-size:18px;
    cursor:pointer; flex-shrink:0; transition: background .2s, transform .1s;
    display:flex; align-items:center; justify-content:center;
  }
  .input-area button:hover { background:var(--brown-light); }
  .input-area button:active { transform:scale(.95); }
  .input-area button:disabled { background:#CCC; cursor:not-allowed; }
  .disclaimer { text-align:center; font-size:11px; color:#BBB; padding:6px 20px 10px; background:var(--white); flex-shrink:0; }

  /* ── 弹窗 ── */
  .modal-overlay {
    display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,.4); z-index:100; justify-content:center; align-items:center;
  }
  .modal-overlay.active { display:flex; }
  .modal {
    background:var(--white); border-radius:var(--radius); padding:28px 32px;
    width:360px; max-width:90%; box-shadow:0 8px 32px rgba(0,0,0,.15);
  }
  .modal h3 { color:var(--brown); margin-bottom:16px; font-size:18px; text-align:center; }
  .modal .field { margin-bottom:12px; }
  .modal .field label { display:block; font-size:13px; color:var(--text-light); margin-bottom:4px; }
  .modal .field input {
    width:100%; padding:10px 12px; border:1.5px solid #E0D5C5;
    border-radius:8px; font-size:14px; outline:none; font-family:inherit;
    transition: border-color .2s;
  }
  .modal .field input:focus { border-color:var(--brown); }
  .modal .btn-primary {
    width:100%; padding:10px; background:var(--brown); color:#fff;
    border:none; border-radius:8px; font-size:14px; cursor:pointer;
    margin-top:8px; transition: background .2s;
  }
  .modal .btn-primary:hover { background:var(--brown-light); }
  .modal .switch { text-align:center; margin-top:12px; font-size:12px; color:var(--text-light); }
  .modal .switch a { color:var(--brown); cursor:pointer; text-decoration:underline; }
  .modal .error { color:#C0392B; font-size:12px; margin-bottom:8px; display:none; }

  /* ── 历史侧栏 ── */
  .history-panel {
    position:absolute; top:0; right:0; width:320px; height:100%;
    background:var(--white); z-index:50; box-shadow:-2px 0 16px rgba(0,0,0,.08);
    display:none; flex-direction:column;
  }
  .history-panel.active { display:flex; }
  .history-panel .h-head {
    padding:16px 20px; border-bottom:1px solid #F0E8DC;
    display:flex; justify-content:space-between; align-items:center;
  }
  .history-panel .h-head h3 { font-size:15px; color:var(--brown); }
  .history-panel .h-list { flex:1; overflow-y:auto; padding:8px 0; }
  .history-panel .h-item {
    padding:10px 20px; cursor:pointer; border-bottom:1px solid #F5F0EB;
    transition: background .15s;
  }
  .history-panel .h-item:hover { background:var(--cream); }
  .history-panel .h-item .q { font-size:13px; color:var(--text); margin-bottom:3px; }
  .history-panel .h-item .meta { font-size:11px; color:var(--muted, #999); }
  .history-panel .h-footer { padding:12px 20px; border-top:1px solid #F0E8DC; }
  .history-panel .btn-clear {
    width:100%; padding:8px; background:#FFF0F0; color:#C0392B;
    border:none; border-radius:8px; font-size:12px; cursor:pointer;
  }
  .history-panel .btn-clear:hover { background:#FFE0E0; }

  @media (max-width:600px) {
    .history-panel { width:100%; }
    .modal { width:90%; padding:24px 20px; }
  }
</style>
</head>
<body>

<div class="app" id="appRoot">

  <!-- 标题栏 -->
  <div class="header">
    <div class="brand">
      <div class="logo">☕</div>
      <div>
        <h1>CUP咖啡 · AI助手</h1>
        <div class="sub">基于门店知识库的智能问答</div>
      </div>
    </div>
    <div class="user-area" id="userArea">
      <button class="btn" onclick="showModal('login')" id="btnLogin">登录</button>
      <button class="btn btn-outline" onclick="showModal('register')" id="btnReg">注册</button>
      <span style="display:none" id="loggedIn">
        <span class="user-tag" id="usernameTag">👤</span>
        <button class="btn" onclick="toggleHistory()" style="margin-left:6px;">📋 记录</button>
        <button class="btn btn-outline" onclick="doLogout()" style="margin-left:4px;">退出</button>
      </span>
    </div>
  </div>

  <!-- 聊天区 -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="icon">🫘</div>
      <h2>你好！我是小C ☕</h2>
      <p>CUP咖啡大学城旗舰店的AI助手<br>关于饮品、促销、服务、设施等问题都可以问我</p>
      <p style="font-size:12px;color:var(--text-light);margin-top:6px;">💡 登录后可保存对话记录</p>
    </div>
  </div>

  <!-- 快捷提问 -->
  <div class="quick-bar" id="quickBar">
    <span class="hint" onclick="askHint(this)">WiFi密码是什么？</span>
    <span class="hint" onclick="askHint(this)">美式咖啡多少钱？</span>
    <span class="hint" onclick="askHint(this)">有什么促销活动？</span>
    <span class="hint" onclick="askHint(this)">咖啡太苦怎么办？</span>
    <span class="hint" onclick="askHint(this)">桂花拿铁怎么卖？</span>
    <span class="hint" onclick="askHint(this)">可以带宠物吗？</span>
  </div>

  <!-- 输入区 -->
  <div class="input-area">
    <textarea id="inputBox" rows="1" placeholder="输入你的问题…" onkeydown="onKeyDown(event)"></textarea>
    <button id="sendBtn" onclick="send()" title="发送">▶</button>
  </div>
  <div class="disclaimer">小C基于门店知识库回答，仅供参考。如有疑问请联系店员。</div>

  <!-- 历史侧栏 -->
  <div class="history-panel" id="historyPanel">
    <div class="h-head">
      <h3>📋 对话记录</h3>
      <button class="btn" style="color:var(--text);border-color:#CCC;" onclick="toggleHistory()">✕</button>
    </div>
    <div class="h-list" id="historyList"><div style="text-align:center;padding:40px;color:#BBB;">加载中...</div></div>
    <div class="h-footer">
      <button class="btn-clear" onclick="clearHistory()">🗑 清空全部记录</button>
    </div>
  </div>
</div>

<!-- 登录/注册弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">登录</h3>
    <div class="error" id="modalError"></div>
    <div class="field">
      <label>用户名</label>
      <input type="text" id="modalUsername" placeholder="输入用户名" maxlength="20">
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="modalPassword" placeholder="输入密码" maxlength="32">
    </div>
    <button class="btn-primary" id="modalSubmit" onclick="doAuth()">登录</button>
    <div class="switch" id="modalSwitch">
      没有账号？<a onclick="switchModal()">立即注册</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  marked.setOptions({ breaks:true, gfm:true });

  // ── 状态 ──
  const chatArea = document.getElementById('chatArea');
  const inputBox = document.getElementById('inputBox');
  const sendBtn = document.getElementById('sendBtn');
  const welcome = document.getElementById('welcome');
  let isWaiting = false;
  let token = localStorage.getItem('cup_token') || '';
  let currentUser = null;
  let modalMode = 'login';

  // ── 初始化 ──
  if (token) checkLogin();

  async function checkLogin() {
    try {
      const r = await fetch('/me', { headers: { Authorization: `Bearer ${token}` } });
      if (r.ok) {
        const d = await r.json();
        if (d.user) { setUser(d.user); return; }
      }
    } catch(e) {}
    localStorage.removeItem('cup_token');
    token = '';
    setUser(null);
  }

  function setUser(user) {
    currentUser = user;
    document.getElementById('btnLogin').style.display = user ? 'none' : '';
    document.getElementById('btnReg').style.display = user ? 'none' : '';
    document.getElementById('loggedIn').style.display = user ? '' : 'none';
    if (user) {
      document.getElementById('usernameTag').textContent = '👤 ' + user.username;
      autoLoadHistory();
    }
  }

  // ── 弹窗 ──
  function showModal(mode) {
    modalMode = mode;
    document.getElementById('modalTitle').textContent = mode === 'login' ? '登录' : '注册';
    document.getElementById('modalSubmit').textContent = mode === 'login' ? '登录' : '注册';
    document.getElementById('modalSwitch').innerHTML = mode === 'login'
      ? '没有账号？<a onclick="switchModal()">立即注册</a>'
      : '已有账号？<a onclick="switchModal()">去登录</a>';
    document.getElementById('modalError').style.display = 'none';
    document.getElementById('modalUsername').value = '';
    document.getElementById('modalPassword').value = '';
    document.getElementById('modalOverlay').classList.add('active');
  }

  function switchModal() { showModal(modalMode === 'login' ? 'register' : 'login'); }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('active');
  });
  document.getElementById('modalPassword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doAuth();
  });

  async function doAuth() {
    const username = document.getElementById('modalUsername').value.trim();
    const password = document.getElementById('modalPassword').value.trim();
    const errEl = document.getElementById('modalError');
    if (!username || !password) {
      errEl.textContent = '请填写用户名和密码'; errEl.style.display = 'block'; return;
    }
    try {
      const r = await fetch(`/${modalMode}`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username,password})
      });
      const d = await r.json();
      if (!r.ok) { errEl.textContent = d.error; errEl.style.display = 'block'; return; }
      token = d.token;
      localStorage.setItem('cup_token', token);
      setUser(d.user);
      document.getElementById('modalOverlay').classList.remove('active');
    } catch(e) {
      errEl.textContent = '网络错误，请重试'; errEl.style.display = 'block';
    }
  }

  async function doLogout() {
    await fetch('/logout', { method:'POST', headers:{Authorization:`Bearer ${token}`} });
    token = '';
    localStorage.removeItem('cup_token');
    setUser(null);
    document.getElementById('historyPanel').classList.remove('active');
  }

  // ── 历史记录 ──
  async function toggleHistory() {
    const panel = document.getElementById('historyPanel');
    if (panel.classList.contains('active')) {
      panel.classList.remove('active');
    } else {
      panel.classList.add('active');
      await loadHistory();
    }
  }

  async function loadHistory() {
    const list = document.getElementById('historyList');
    try {
      const r = await fetch('/history', { headers:{Authorization:`Bearer ${token}`} });
      if (!r.ok) { list.innerHTML = '<div style="text-align:center;padding:40px;color:#BBB;">请先登录</div>'; return; }
      const d = await r.json();
      if (!d.history.length) {
        list.innerHTML = '<div style="text-align:center;padding:40px;color:#BBB;">暂无对话记录</div>';
        return;
      }
      list.innerHTML = d.history.map(h => `
        <div class="h-item" onclick="showHistory(${h.id})">
          <div class="q">${escHtml(h.question)}</div>
          <div class="meta">${h.created_at} · ${(h.tokens?.total||0)} tokens</div>
        </div>
      `).join('');
    } catch(e) {
      list.innerHTML = '<div style="text-align:center;padding:40px;color:#BBB;">加载失败</div>';
    }
  }

  let historyCache = {};
  function showHistory(id) {
    if (welcome) welcome.remove();
    // 移除之前展示的历史消息
    document.querySelectorAll('.msg.history-msg').forEach(el => el.remove());

    fetch('/history', { headers:{Authorization:`Bearer ${token}`} })
      .then(r => r.json())
      .then(d => {
        const h = d.history.find(x => x.id === id);
        if (!h) return;
        addMessage('user', h.question, false, [], null, 'history-msg');
        addMessage('assistant', h.answer, false, h.sources || [], h.tokens || {}, 'history-msg');
        chatArea.scrollTop = chatArea.scrollHeight;
      });
  }

  async function autoLoadHistory() {
    // 聊天区为空时，自动加载最近一条对话
    const hasMsgs = chatArea.querySelector('.msg');
    if (hasMsgs && !chatArea.querySelector('.welcome')) return;
    try {
      const r = await fetch('/history', { headers:{Authorization:`Bearer ${token}`} });
      if (!r.ok) return;
      const d = await r.json();
      if (d.history && d.history.length > 0) {
        if (welcome) welcome.remove();
        const last = d.history[0];
        const hint = document.createElement('div');
        hint.style.cssText = 'text-align:center;font-size:12px;color:var(--text-light);margin-bottom:4px;';
        hint.textContent = '📋 最近对话（共 ' + d.history.length + ' 条记录）';
        chatArea.appendChild(hint);
        addMessage('user', last.question, false, [], null, 'history-msg');
        addMessage('assistant', last.answer, false, last.sources || [], last.tokens || {}, 'history-msg');
      }
    } catch(e) {}
  }

  async function clearHistory() {
    if (!confirm('确定清空全部对话记录？此操作不可撤销。')) return;
    await fetch('/history/clear', { method:'POST', headers:{Authorization:`Bearer ${token}`} });
    loadHistory();
    chatArea.innerHTML = '';
    chatArea.appendChild(welcomeClone());
  }

  function welcomeClone() {
    const div = document.createElement('div');
    div.className = 'welcome';
    div.id = 'welcome';
    div.innerHTML = '<div class="icon">🫘</div><h2>你好！我是小C ☕</h2><p>CUP咖啡大学城旗舰店的AI助手<br>关于饮品、促销、服务、设施等问题都可以问我</p>';
    return div;
  }

  // ── 聊天 ──
  function onKeyDown(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); send(); } }
  function askHint(el) { inputBox.value = el.textContent; send(); }

  async function send() {
    const question = inputBox.value.trim();
    if (!question || isWaiting) return;
    if (welcome) welcome.remove();
    addMessage('user', question);
    inputBox.value = ''; inputBox.style.height = 'auto';
    const loadingMsg = addMessage('assistant', '', true);
    isWaiting = true; sendBtn.disabled = true;
    try {
      const headers = { 'Content-Type':'application/json' };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const resp = await fetch('/chat', { method:'POST', headers, body:JSON.stringify({question}) });
      const data = await resp.json();
      loadingMsg.remove();
      if (data.error) {
        addMessage('assistant', '抱歉，出了点问题：' + data.error);
      } else {
        addMessage('assistant', data.answer, false, data.sources||[], data.tokens);
      }
      // 如果侧栏打开，刷新
      if (document.getElementById('historyPanel').classList.contains('active')) loadHistory();
    } catch(err) {
      loadingMsg.remove();
      addMessage('assistant', '网络请求失败，请确认服务已启动。');
    } finally {
      isWaiting = false; sendBtn.disabled = false; inputBox.focus();
    }
  }

  function addMessage(role, text, isLoading, sources, tokens, extraClass) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (extraClass) div.classList.add(extraClass);
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '☕';
    const bubbleWrap = document.createElement('div');
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (isLoading) {
      bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    } else if (role === 'assistant') {
      bubble.innerHTML = marked.parse(text);
    } else {
      bubble.textContent = text;
    }
    bubbleWrap.appendChild(bubble);
    if (sources && sources.length > 0) {
      const sdiv = document.createElement('div');
      sdiv.className = 'sources';
      sources.forEach(s => {
        const tag = document.createElement('span');
        tag.className = 'source-tag';
        tag.textContent = '📎 ' + s.title;
        tag.title = '分类: ' + s.category;
        sdiv.appendChild(tag);
      });
      bubbleWrap.appendChild(sdiv);
    }
    if (tokens && tokens.total > 0) {
      const tdiv = document.createElement('div');
      tdiv.className = 'token-info';
      tdiv.textContent = '🔢 消耗 ' + tokens.total + ' tokens（输入 ' + tokens.prompt + ' + 输出 ' + tokens.completion + '）';
      bubbleWrap.appendChild(tdiv);
    }
    div.appendChild(avatar);
    div.appendChild(bubbleWrap);
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    inputBox.style.height = 'auto';
    inputBox.style.height = Math.min(inputBox.scrollHeight, 100) + 'px';
    return div;
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
</script>
</body>
</html>
